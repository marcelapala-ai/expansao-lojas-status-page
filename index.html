<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centauro | Hub de Projetos 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        .tab-content { display: none; height: 80vh; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #C8102E; color: #C8102E !important; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav class="bg-white border-b-4 border-[#C8102E] py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-[#C8102E] text-white font-black px-3 py-1 rounded italic text-xl">CENTAURO</div>
                <h1 class="text-gray-500 font-medium hidden md:block">Status Page Executiva</h1>
            </div>
            <div class="text-sm font-bold text-gray-400 uppercase tracking-widest">Atualizado: Março 2026</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border-l-8 border-red-600 shadow-sm">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase">Projeto Refit II</p>
                        <h2 class="text-2xl font-extrabold text-gray-800">47 Lojas</h2>
                    </div>
                    <span class="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">22.8% Concluído</span>
                </div>
                <div class="mt-4 flex gap-4 text-sm text-gray-600">
                    <span><i data-lucide="check-circle" class="inline w-4 h-4 text-green-500"></i> 44 Atividades</span>
                    <span><i data-lucide="clock" class="inline w-4 h-4 text-orange-500"></i> 129 Pendentes</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl border-l-8 border-slate-800 shadow-sm">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase">Benfeitorias </p>
                        <h2 class="text-2xl font-extrabold text-gray-800">208 Lojas</h2>
                    </div>
                    <span class="bg-slate-100 text-slate-700 text-xs font-bold px-2 py-1 rounded">28 Instaladas</span>
                </div>
                <div class="mt-4 flex gap-4 text-sm text-gray-600">
                    <span><i data-lucide="calendar" class="inline w-4 h-4 text-blue-500"></i> 16 Agendadas</span>
                    <span><i data-lucide="alert-triangle" class="inline w-4 h-4 text-yellow-500"></i> 14 Pendências</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-t-xl flex border-b">
            <button onclick="openTab('refit', this)" class="tab-btn active-tab px-8 py-4 font-bold text-gray-500 hover:bg-gray-50 transition-all flex items-center gap-2">
                <i data-lucide="construction"></i> Projeto Refit 2026
            </button>
            <button onclick="openTab('benfeitorias', this)" class="tab-btn px-8 py-4 font-bold text-gray-500 hover:bg-gray-50 transition-all flex items-center gap-2">
                <i data-lucide="monitor"></i> Benfeitorias
            </button>
        </div>

        <div id="refit" class="tab-content active">
            <iframe src="refit.html"></iframe>
        </div>

        <div id="benfeitorias" class="tab-content">
            <iframe src="benfeitorias.html"></iframe>
        </div>

    </main>

    <footer class="text-center py-8 text-gray-400 text-xs">
        &copy; 2026 Centauro Esportes - Gestão de Projetos de Engenharia e Tecnologia
    </footer>

    <script>
        lucide.createIcons();

        function openTab(tabId, btn) {
            // Esconde todos os conteúdos
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));

            // Remove classe ativa de todos os botões
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active-tab'));

            // Mostra o selecionado
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active-tab');
        }
    </script>
</body>
</html>
